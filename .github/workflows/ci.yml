name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # ⛔ cukup 1 untuk stabilitas CI

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql://user:password@localhost:5432/test_db
      JWT_SECRET: ci_test_secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Dengan schema folder (Prisma v5.15+), langkah merge manual tidak lagi diperlukan.
      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Generate Prisma Client
        run: npx prisma generate

      # ⛔ Gunakan db push untuk testing (lebih cepat dari migrate)
      - name: Sync Database schema
        run: npx prisma db push

      - name: Run dependency-cruiser
        run: npx --yes dependency-cruiser --config .dependency-cruiser.js --validate src --output-type err

      - name: Run tests
        run: npm test -- --runInBand
