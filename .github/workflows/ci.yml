name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run dependency-cruiser (enforce architecture boundaries)
        run: npx --yes dependency-cruiser --config .dependency-cruiser.js --validate src --output-type err

      - name: Build Prisma schema
        run: npm run prisma:schema:build

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync Database schema
        run: npx prisma db push --skip-generate
        env:
          DB_URL: postgresql://user:password@localhost:5432/test_db

      - name: Run tests
        run: npm test
        env:
          DB_URL: postgresql://user:password@localhost:5432/test_db
          JWT_SECRET: ci_test_secret
          NODE_ENV: test
